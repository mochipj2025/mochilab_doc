<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manga Scene Kit</title>
  <style>
    :root { --paper:#f3eadc; --card:#fffaf2; --ink:#1f2528; --muted:#667174; --deep:#173946; --line:rgba(67,78,80,.16); --brown:#7a5c3e; }
    *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.8} main{width:min(100% - 28px,1080px);margin:0 auto;padding:34px 0 56px} header{display:grid;gap:12px;padding:20px 0 28px} h1{margin:0;color:var(--deep);font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:clamp(2rem,8vw,3.5rem);line-height:1.2} p{margin:0;color:var(--muted)} a{color:var(--brown);font-weight:700}.grid{display:grid;gap:16px}.panel{border:1px solid var(--line);border-radius:22px;background:rgba(255,250,242,.88);padding:18px;box-shadow:0 14px 34px rgba(45,55,55,.08)} label{display:block;color:var(--deep);font-weight:800;margin-bottom:7px} textarea,input,select{width:100%;border:1px solid var(--line);border-radius:14px;background:#fffdf8;color:var(--ink);padding:12px 13px;font:inherit} textarea{min-height:130px;resize:vertical}.output{min-height:380px;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;line-height:2}.row{display:grid;gap:10px;grid-template-columns:1fr}.actions{display:grid;gap:10px;grid-template-columns:1fr 1fr;margin-top:12px}button{min-height:48px;border:0;border-radius:999px;padding:10px 16px;font-weight:800;cursor:pointer}.primary{background:var(--deep);color:#fffaf2}.quiet{background:#eadac7;color:#4f3924}.status{min-height:1.5em;color:var(--brown);font-weight:800;font-size:.9rem}@media(min-width:820px){.grid{grid-template-columns:1fr 1fr}.row{grid-template-columns:1fr 1fr 1fr}}
  </style>
</head>
<body>
  <main>
    <header><a href="../index.html">← Character Preset Maker に戻る</a><h1>Manga Scene Kit</h1><p>キャラJSONから、吹き出し少なめの縦スクロール漫画Promptを作ります。</p></header>
    <div class="grid">
      <section class="panel">
        <label for="jsonInput">キャラJSON</label><textarea id="jsonInput" placeholder="キャラJSONを貼り付け"></textarea>
        <div class="row">
          <div><label for="sceneCount">場面数</label><select id="sceneCount"><option>4場面</option><option>5場面</option><option>6場面</option></select></div>
          <div><label for="purpose">シーンの目的</label><select id="purpose"><option>帰り道</option><option>出会い</option><option>発見</option><option>沈黙</option><option>別れ</option></select></div>
          <div><label for="dialogue">セリフ量</label><select id="dialogue"><option>セリフなし</option><option>一言だけ</option><option>少なめ</option><option>モノローグ中心</option></select></div>
        </div>
        <label for="beats">場面メモ</label><textarea id="beats">1. 雨の街で立ち止まる
2. 小さな光に気づく
3. 静かに歩き出す
4. 背中だけが街の灯りに溶ける</textarea>
        <div class="actions"><button class="primary" id="generate">Prompt生成</button><button class="quiet" id="sample">サンプルJSON</button><button class="quiet" id="loadSaved">母艦から読み込む</button></div>
      </section>
      <section class="panel">
        <label for="output">生成結果</label><textarea class="output" id="output" readonly></textarea>
        <div class="actions"><button class="primary" id="copy">コピー</button><button class="quiet" id="clear">消す</button></div><p class="status" id="status"></p>
      </section>
    </div>
  </main>
  <script>
    const sample={name:"灯 / Akari",visual_lock:{hair:"黒髪、ぱっつん寄りの前髪",eyes:"静かな目",outfit:"黒い雨用ジャケット、チョーカー、厚底ブーツ"},world:{place:"雨の夜のサイバー都市",tone:"静かで湿度のある夜"}};
    const $=id=>document.getElementById(id); function readJson(){try{return JSON.parse($("jsonInput").value||"{}")}catch{return {}}} function compact(o){return JSON.stringify(o,null,2).replace(/[{}"]/g,"").split("\n").map(s=>s.trim()).filter(Boolean).slice(0,22).join("\n")}
    function generate(){const c=readJson();$("output").value=`縦スクロール漫画形式。\n${$("sceneCount").value}構成。\n${$("purpose").value}のシーン。\n${$("dialogue").value}。\n吹き出しを使いすぎず、表情と空気感で物語を伝える。\n\nキャラクター設定。\n${compact(c)||"キャラJSON未入力。静かなキャラクター。"}\n\n場面の流れ。\n${$("beats").value.trim()}\n\n全体の空気。\n静かな余白。\n雨、光、視線、背中で感情を見せる。\n日本語の短い詩を必要な場面だけに添える。`; $("status").textContent=""}
    async function copy(){ $("output").select(); document.execCommand("copy"); $("status").textContent="コピーしました"; }
    function loadSaved(){const saved=localStorage.getItem("characterPresetJson");if(saved){$("jsonInput").value=saved;generate();$("status").textContent="母艦のJSONを読み込みました"}else{$("status").textContent="保存されたJSONがありません"}}
    $("generate").onclick=generate; $("copy").onclick=copy; $("clear").onclick=()=>$("output").value=""; $("sample").onclick=()=>{$("jsonInput").value=JSON.stringify(sample,null,2);generate()}; $("loadSaved").onclick=loadSaved; generate();
  </script>
</body>
</html>
