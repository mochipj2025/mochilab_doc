<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Book Kit</title>
  <style>
    :root { --paper:#f3eadc; --card:#fffaf2; --ink:#1f2528; --muted:#667174; --deep:#173946; --line:rgba(67,78,80,.16); --brown:#7a5c3e; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--paper); color:var(--ink); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.8; }
    main { width:min(100% - 28px, 1080px); margin:0 auto; padding:34px 0 56px; }
    header { display:grid; gap:12px; padding:20px 0 28px; }
    h1 { margin:0; color:var(--deep); font-family:"Hiragino Mincho ProN","Yu Mincho",serif; font-size:clamp(2rem,8vw,3.5rem); line-height:1.2; }
    p { margin:0; color:var(--muted); }
    a { color:var(--brown); font-weight:700; }
    .grid { display:grid; gap:16px; }
    .panel { border:1px solid var(--line); border-radius:22px; background:rgba(255,250,242,.88); padding:18px; box-shadow:0 14px 34px rgba(45,55,55,.08); }
    label { display:block; color:var(--deep); font-weight:800; margin-bottom:7px; }
    textarea,input,select { width:100%; border:1px solid var(--line); border-radius:14px; background:#fffdf8; color:var(--ink); padding:12px 13px; font:inherit; }
    textarea { min-height:130px; resize:vertical; }
    .output { min-height:360px; font-family:"Hiragino Mincho ProN","Yu Mincho",serif; line-height:2; }
    .row { display:grid; gap:10px; grid-template-columns:1fr; }
    .actions { display:grid; gap:10px; grid-template-columns:1fr 1fr; margin-top:12px; }
    button { min-height:48px; border:0; border-radius:999px; padding:10px 16px; font-weight:800; cursor:pointer; }
    .primary { background:var(--deep); color:#fffaf2; }
    .quiet { background:#eadac7; color:#4f3924; }
    .status { min-height:1.5em; color:var(--brown); font-weight:800; font-size:.9rem; }
    @media (min-width:820px) { .grid { grid-template-columns:1fr 1fr; } .row { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <main>
    <header>
      <a href="../index.html">← Character Preset Maker に戻る</a>
      <h1>Photo Book Kit</h1>
      <p>キャラJSONを読み込み、写真集風ページのPromptに変換します。</p>
    </header>
    <div class="grid">
      <section class="panel">
        <label for="jsonInput">キャラJSON</label>
        <textarea id="jsonInput" placeholder="キャラJSONを貼り付け"></textarea>
        <div class="row">
          <div><label for="pageCount">ページ数</label><select id="pageCount"><option>4ページ</option><option>6ページ</option><option>8ページ</option></select></div>
          <div><label for="tone">写真集の空気</label><input id="tone" value="雨の夜、静かな都市光、余白のある紙面"></div>
        </div>
        <label for="poem">縦書きの詩</label>
        <textarea id="poem">小さな光だけが、帰り道を覚えていた。</textarea>
        <div class="actions">
          <button class="primary" id="generate">Prompt生成</button>
          <button class="quiet" id="sample">サンプルJSON</button>
          <button class="quiet" id="loadSaved">母艦から読み込む</button>
        </div>
      </section>
      <section class="panel">
        <label for="output">生成結果</label>
        <textarea class="output" id="output" readonly></textarea>
        <div class="actions">
          <button class="primary" id="copy">コピー</button>
          <button class="quiet" id="clear">消す</button>
        </div>
        <p class="status" id="status"></p>
      </section>
    </div>
  </main>
  <script>
    const sample = { name:"灯 / Akari", visual_lock:{ hair:"黒髪、長めの前髪", eyes:"静かな目、暗い瞳", outfit:"黒いオーバーサイズの雨用ジャケット、チョーカー、厚底ブーツ" }, world:{ place:"雨の夜のサイバー都市", light:"青い都市光、濡れた路面反射", tone:"暗く静か、湿度のある映画的な空気" } };
    const $ = (id) => document.getElementById(id);
    function readJson(){ try { return JSON.parse($("jsonInput").value || "{}"); } catch { return {}; } }
    function compact(obj){ return JSON.stringify(obj, null, 2).replace(/[{}"]/g,"").split("\n").map(s=>s.trim()).filter(Boolean).slice(0,22).join("\n"); }
    function generate(){
      const c = readJson();
      $("output").value = `写真集風レイアウト。\n${$("pageCount").value}構成。\n${$("tone").value}。\n\nキャラクター設定。\n${compact(c) || "キャラJSON未入力。黒い雨具の静かなキャラクター。"}\n\nページ構成。\n1ページ目。余白を広く取り、キャラクターの全身を静かに見せる。\n2ページ目。バストアップ。目、髪、表情の空気を見せる。\n3ページ目。衣装、手元、靴、アクセサリーのディテールカット。\n4ページ目。背面または歩き去る構図。物語の余韻を残す。\n\n紙面。\n日本語の縦書き詩を細く配置。\n写真と余白を大切にした静かな編集デザイン。\n\n『${$("poem").value.trim()}』`;
      $("status").textContent = "";
    }
    async function copy(){ $("output").select(); document.execCommand("copy"); $("status").textContent = "コピーしました"; }
    function loadSaved(){ const saved = localStorage.getItem("characterPresetJson"); if(saved){ $("jsonInput").value = saved; generate(); $("status").textContent = "母艦のJSONを読み込みました"; } else { $("status").textContent = "保存されたJSONがありません"; } }
    $("generate").onclick = generate; $("copy").onclick = copy; $("clear").onclick = () => $("output").value = ""; $("sample").onclick = () => { $("jsonInput").value = JSON.stringify(sample,null,2); generate(); }; $("loadSaved").onclick = loadSaved;
    generate();
  </script>
</body>
</html>
