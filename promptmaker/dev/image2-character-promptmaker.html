<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=character-promptmaker/">
  <title>Character Idea Makerへ移動中</title>
  <style>
    html {
      min-width: 320px;
      color: #1c3038;
      background: #f7f4ef;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
      line-height: 1.8;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 560px);
      border: 1px solid #d2c3ad;
      border-radius: 8px;
      padding: 24px;
      background: #fffdf8;
      box-shadow: 0 18px 42px rgba(31, 47, 54, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      color: #143d4d;
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #67777d;
      font-size: 14px;
    }

    a {
      color: #143d4d;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>Character Idea Makerへ移動します</h1>
    <p>新しい設計のIdea Makerは <a href="character-promptmaker/">こちら</a> です。</p>
  </main>
</body>
</html>
