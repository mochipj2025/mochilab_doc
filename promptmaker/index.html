<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promptmaker</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --surface: #fffdf8;
      --ink: #1d2f39;
      --muted: #64747b;
      --line: #c8aa82;
      --sea: #143746;
      --amber: #b9854a;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, sans-serif;
      line-height: 1.8;
    }

    body {
      margin: 0;
    }

    main {
      min-height: 100svh;
      display: grid;
      align-content: center;
      padding: 32px 16px;
      background:
        radial-gradient(circle at 14% 8%, rgba(134, 190, 203, 0.3), transparent 28%),
        linear-gradient(180deg, rgba(255, 253, 248, 0.82), rgba(247, 244, 238, 0.98));
    }

    .shell {
      width: min(100%, 720px);
      margin: 0 auto;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--amber);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--sea);
      font-size: clamp(30px, 9vw, 52px);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .lead {
      max-width: 560px;
      margin: 14px 0 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .section-label {
      margin: 26px 0 10px;
      color: var(--sea);
      font-size: 13px;
      font-weight: 700;
    }

    .tool-link {
      display: block;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      color: inherit;
      background: rgba(255, 253, 248, 0.88);
      text-decoration: none;
      box-shadow: 0 18px 42px rgba(32, 46, 52, 0.08);
    }

    .tool-link.primary {
      border-color: var(--sea);
      background: var(--sea);
      color: var(--surface);
    }

    .tool-link.primary strong,
    .tool-link.primary span {
      color: var(--surface);
    }

    .tool-link + .tool-link {
      margin-top: 12px;
    }

    .tool-link strong {
      display: block;
      color: var(--sea);
      font-size: 18px;
      line-height: 1.5;
    }

    .tool-link span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <div class="shell">
      <p class="eyebrow">M.O.C.H.I. LABO / Promptmaker</p>
      <h1>Promptmaker</h1>
      <p class="lead">日本語の短い入力から、画像生成AIに渡しやすいPromptを作る道具置き場です。</p>
      <p class="section-label">いま使う</p>
      <a class="tool-link primary" href="simple-character-promptmaker/">
        <strong>キャラクタープロンプトメーカー</strong>
        <span>短い日本語入力と候補選択で、自然な箇条書きのキャラクターPromptを作ります。</span>
      </a>
      <a class="tool-link primary" href="content-kit/">
        <strong>Content Prompt Kit</strong>
        <span>漫画カット、雑誌ページ、SNS素材へ展開するPromptを作ります。</span>
      </a>
      <p class="section-label">試作</p>
      <a class="tool-link" href="dev/companion-maker.html">
        <strong>あなただけの相棒maker</strong>
        <span>小さな相棒キャラの三面図Promptを作る試作品です。</span>
      </a>
    </div>
  </main>
</body>
</html>
